<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LocalScale — Local-first container management platform with real-time metrics, cost economics, carbon tracking, and policy-driven governance." />
    <meta name="theme-color" content="#e4e8eb" />
    <link rel="icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>LocalScale | Container Infrastructure Platform</title>
    <script>
      // Safety prelude: ensure react-refresh globals exist and surface runtime errors
      window.$RefreshReg$ = window.$RefreshReg$ || function () {}
      window.$RefreshSig$ = window.$RefreshSig$ || function () {
        return function (type) {
          return type
        }
      }

      function showOverlay(msg) {
        try {
          const id = 'ls-runtime-error-overlay'
          let el = document.getElementById(id)
          if (!el) {
            el = document.createElement('div')
            el.id = id
            Object.assign(el.style, {
              position: 'fixed',
              left: '0',
              right: '0',
              top: '0',
              background: '#111',
              color: '#fff',
              padding: '12px',
              zIndex: '999999',
              fontFamily: 'monospace',
              whiteSpace: 'pre-wrap'
            })
            document.body && document.body.appendChild(el)
          }
          el.textContent = msg
        } catch (e) {
          // ignore
        }
      }

      window.addEventListener('error', (e) => {
        const msg = 'Runtime error: ' + (e.error && (e.error.stack || e.error.message) || e.message)
        showOverlay(msg)
        console.error(e.error || e)
      })

      window.addEventListener('unhandledrejection', (ev) => {
        const reason = ev.reason
        const msg = 'Unhandled rejection: ' + (reason && (reason.stack || reason.message) || String(reason))
        showOverlay(msg)
        console.error('Unhandled rejection', reason)
      })
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
